# Fly.io deployment config for ScaleChat API.
# Region: Bombay (bom) — same as Neon Mumbai + Upstash AP-South.

app = "scalechat-api"
primary_region = "bom"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "../../Dockerfile"
  # When the Dockerfile sits at the repo root we'd use ".". Update if you move it.

[experimental]
  auto_rollback = true

[env]
  PORT = "4000"
  NODE_ENV = "production"
  LOG_LEVEL = "info"
  JWT_ISSUER = "scalechat"
  JWT_AUDIENCE = "scalechat-mobile"
  JWT_ACCESS_TTL_SECONDS = "900"
  JWT_REFRESH_TTL_DAYS = "30"
  OTP_REQUEST_PER_PHONE_PER_HOUR = "5"
  OTP_REQUEST_PER_IP_PER_HOUR = "20"
  OTP_VERIFY_MAX_ATTEMPTS = "5"
  OTP_TTL_SECONDS = "300"
  MSG91_BASE_URL = "https://control.msg91.com"
  MSG91_SENDER_ID = "SCLCHT"
  ENABLE_DEV_OTP = "false"

# Secrets (set via `fly secrets set …`):
#   DATABASE_URL
#   REDIS_URL
#   JWT_PRIVATE_KEY_B64
#   JWT_PUBLIC_KEY_B64
#   MSG91_AUTH_KEY
#   MSG91_TEMPLATE_ID
#   ALLOWED_ORIGINS

[[services]]
  internal_port = 4000
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"

  [[services.http_checks]]
    interval = "10s"
    timeout = "2s"
    method = "get"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory = "1gb"
